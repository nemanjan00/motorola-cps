services:
  - type: web
    name: motorola-cps
    runtime: static
    buildCommand: cd app && npm install && npm run build
    staticPublishPath: app/dist
    headers:
      - path: /assets/*.css
        name: Content-Type
        value: text/css
      - path: /assets/*.js
        name: Content-Type
        value: application/javascript
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
